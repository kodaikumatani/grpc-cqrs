services:
  postgres:
    image: postgres:18-bookworm
    environment:
      POSTGRES_DATABASE: gcook
      POSTGRES_USER: gcook
      POSTGRES_PASSWORD: p4ssw0rd!
    volumes:
      - ./database/initdb.d:/docker-entrypoint-initdb.d:ro
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "gcook"]
      start_period: 0s
      interval: 1s
      timeout: 5s
    ports:
      - "127.0.0.1:25432:5432"
      - "[::1]:25432:5432"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      start_period: 0s
      interval: 1s
      timeout: 5s
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/exports
      "

  fake-gcs-server:
    image: fsouza/fake-gcs-server:latest
    command: -scheme http -port 4443
    volumes:
      - gcs_data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4443/storage/v1/b"]
      start_period: 0s
      interval: 1s
      timeout: 5s
    ports:
      - "127.0.0.1:4443:4443"

volumes:
  postgres_data:
  minio_data:
  gcs_data:
